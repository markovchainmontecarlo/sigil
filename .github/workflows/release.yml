name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "ARCHITECTURE.md"
      - "assets/**"
      - "preview/**"
      - "handoffs/**"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run smoke:distribution

  release:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Pack release archive
        run: bash scripts/pack.sh
      - name: Compute release metadata
        id: meta
        run: |
          set -euo pipefail
          name="$(bun -e 'const p = await import("./package.json", { with: { type: "json" } }); console.log(p.default.name)')"
          version="$(bun -e 'const p = await import("./package.json", { with: { type: "json" } }); console.log(p.default.version)')"
          tag="v${version}"
          asset="dist/${name}-${version}.tgz"
          checksum="${asset}.sha256"
          {
            echo "name=${name}"
            echo "version=${version}"
            echo "tag=${tag}"
            echo "asset=${asset}"
            echo "checksum=${checksum}"
          } >> "$GITHUB_OUTPUT"
      - name: Check whether release tag already exists
        id: exists
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub release
        if: steps.exists.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          NAME: ${{ steps.meta.outputs.name }}
          VERSION: ${{ steps.meta.outputs.version }}
          ASSET: ${{ steps.meta.outputs.asset }}
          CHECKSUM: ${{ steps.meta.outputs.checksum }}
        run: |
          set -euo pipefail
          gh release create "$TAG" "$ASSET" "$CHECKSUM" \
            --target "$GITHUB_SHA" \
            --title "${NAME} ${VERSION}" \
            --notes "Automated release for ${NAME} ${VERSION}."
      - name: Skip existing release version
        if: steps.exists.outputs.skip == 'true'
        run: echo "Release tag already exists for this package version. Bump package.json version to publish a new release."
