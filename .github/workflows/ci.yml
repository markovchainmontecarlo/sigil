name: CI

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "ARCHITECTURE.md"
      - "assets/**"
      - "preview/**"
      - "handoffs/**"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "ARCHITECTURE.md"
      - "assets/**"
      - "preview/**"
      - "handoffs/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run smoke:distribution

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
